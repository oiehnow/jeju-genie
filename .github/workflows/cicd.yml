# 제주 지니 CI/CD — lint/test → 이미지 빌드 → Artifact Registry push → Cloud Run 배포
#
# 필요한 GitHub Secrets (Pipeline 챕터에서 쓰던 것과 동일 패턴):
#   GCP_SA_KEY            : 서비스계정 JSON 키 (run.admin + artifactregistry.writer + iam.serviceAccountUser)
#   GCP_PROJECT_ID        : project-65d06dcc-5794-483b-b6f
#   OPENAI_API_KEY        : (선택) 배포 서비스에 주입할 GPT 키
name: cicd

on:
  push:
    branches: [main]

env:
  REGION: asia-northeast3
  REPO: mlops-quicklab
  IMAGE: jeju-genie
  SERVICE: jeju-genie

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt ruff
      - name: Lint (ruff)
        run: ruff check backend/app
      - name: Test (pytest)
        run: cd backend && python -m pytest tests/ -q

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build image
        run: >
          docker build --provenance=false --sbom=false --platform linux/amd64
          -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest .
      - name: Push image
        run: docker push --all-tags ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}
      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy ${{ env.SERVICE }}
          --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          --region ${{ env.REGION }}
          --allow-unauthenticated
          --memory 1Gi --cpu 1
          --min-instances 0 --max-instances 2
          --update-env-vars "GCS_BUCKET=${{ secrets.GCP_PROJECT_ID }}-mlops-quicklab"
          --project ${{ secrets.GCP_PROJECT_ID }}
